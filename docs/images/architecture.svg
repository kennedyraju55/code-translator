<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#e63946"/></marker>
  </defs>
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>
  <text x="400" y="35" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#ffffff" text-anchor="middle">Architecture Overview</text>
  
  <!-- Input -->
  <rect x="30" y="65" width="130" height="55" rx="10" fill="#1a1e2e" stroke="#e63946" stroke-width="1.5"/>
  <text x="95" y="88" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#e63946" text-anchor="middle">📄 Source File</text>
  <text x="95" y="108" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">.py .js .java .go</text>

  <line x1="160" y1="92" x2="195" y2="92" stroke="#e63946" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Lang Detector -->
  <rect x="200" y="65" width="120" height="55" rx="10" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="260" y="88" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">🌐 Lang Detector</text>
  <text x="260" y="108" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Auto-detect source</text>

  <line x1="320" y1="92" x2="355" y2="92" stroke="#e63946" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Code Reader -->
  <rect x="360" y="65" width="120" height="55" rx="10" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="420" y="88" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">📖 Code Reader</text>
  <text x="420" y="108" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Read + truncate</text>

  <line x1="480" y1="92" x2="515" y2="92" stroke="#e63946" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Prompt -->
  <rect x="520" y="65" width="120" height="55" rx="10" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="580" y="88" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">🔨 Prompt Builder</text>
  <text x="580" y="108" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">src→target context</text>

  <line x1="580" y1="120" x2="580" y2="155" stroke="#e63946" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- LLM -->
  <rect x="490" y="160" width="180" height="60" rx="10" fill="#1a1e2e" stroke="#e63946" stroke-width="2"/>
  <text x="580" y="187" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#e63946" text-anchor="middle">🤖 Ollama LLM</text>
  <text x="580" y="207" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">Code translation engine</text>

  <line x1="490" y1="190" x2="430" y2="250" stroke="#e63946" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Output Row -->
  <rect x="30" y="255" width="150" height="55" rx="10" fill="#1a1e2e" stroke="#e63946" stroke-width="1.5"/>
  <text x="105" y="278" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#e63946" text-anchor="middle">📝 Translated Code</text>
  <text x="105" y="298" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Idiomatic output</text>

  <rect x="200" y="255" width="150" height="55" rx="10" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="275" y="278" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">✅ Syntax Validator</text>
  <text x="275" y="298" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Basic validation</text>

  <rect x="370" y="255" width="150" height="55" rx="10" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="445" y="278" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">📊 Comparison</text>
  <text x="445" y="298" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Lines, chars, ratio</text>

  <rect x="540" y="255" width="150" height="55" rx="10" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="615" y="278" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">📋 Translation Notes</text>
  <text x="615" y="298" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Language differences</text>

  <line x1="370" y1="262" x2="180" y2="262" stroke="#e63946" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="180" y1="282" x2="200" y2="282" stroke="#e63946" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="282" x2="370" y2="282" stroke="#e63946" stroke-width="1" marker-end="url(#arrowhead)"/>

  <!-- Batch Mode -->
  <rect x="30" y="330" width="200" height="45" rx="8" fill="#1a1e2e" stroke="#e63946" stroke-width="1" stroke-dasharray="4"/>
  <text x="130" y="357" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#e63946" text-anchor="middle">📦 Batch Translation Mode</text>

  <rect x="30" y="350" width="740" height="35" rx="8" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <text x="400" y="373" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">🔒 100% Local • 10 Languages Supported • Syntax Validation • Batch Processing</text>
</svg>
